name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          MACOS_ARM64: ${{ github.event.client_payload.macos_arm64_sha256 }}
          MACOS_X86_64: ${{ github.event.client_payload.macos_x86_64_sha256 }}
          LINUX_X86_64: ${{ github.event.client_payload.linux_x86_64_sha256 }}
          LINUX_ARM64: ${{ github.event.client_payload.linux_arm64_sha256 }}
        run: |
          FORMULA=Formula/runix.rb

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update SHA256 hashes — match the sha256 line following each url
          python3 - <<'PYEOF'
          import re, os

          formula = open("Formula/runix.rb").read()
          version = os.environ["VERSION"]

          replacements = {
              "aarch64-apple-darwin": os.environ.get("MACOS_ARM64", ""),
              "x86_64-apple-darwin": os.environ.get("MACOS_X86_64", ""),
              "x86_64-unknown-linux-gnu": os.environ.get("LINUX_X86_64", ""),
              "aarch64-unknown-linux-gnu": os.environ.get("LINUX_ARM64", ""),
          }

          for target, sha in replacements.items():
              if not sha:
                  continue
              # Match: url line with target, then sha256 line on next line
              pattern = rf'(url "https://github.com/bumahkib7/runix-releases/releases/download/v[^"]*/{re.escape("runix-" + target)}.tar.gz"\s*\n\s*sha256 ")[a-fA-F0-9]+|PLACEHOLDER(")'
              formula = re.sub(
                  rf'(url "https://github\.com/bumahkib7/runix-releases/releases/download/v\#\{{version\}}/runix-{re.escape(target)}\.tar\.gz"\s*\n\s*sha256 ")[^"]*(")',
                  rf'\g<1>{sha}\2',
                  formula
              )

          open("Formula/runix.rb", "w").write(formula)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/runix.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update runix to v${{ github.event.client_payload.version }}"
          git push
